name: 持续集成

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    name: Shell 检查
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: 安装工具
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt jq

      - name: Bash 语法检查
        run: |
          bash -n install.sh
          bash -n scripts/generate-checksums.sh
          bash -n tests/test_install.sh

      - name: ShellCheck
        run: |
          shellcheck install.sh scripts/generate-checksums.sh tests/test_install.sh

      - name: shfmt
        run: |
          shfmt -d -i 2 -ci -bn install.sh scripts/generate-checksums.sh tests/test_install.sh

      - name: 测试
        run: |
          bash tests/test_install.sh
